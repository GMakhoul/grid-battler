# fly.toml — servidor do Grid Battler em São Paulo (gru) p/ baixa latência no Brasil.
# (No Render o ping ficava ~440ms; aqui deve cair p/ ~80-160ms.)
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'grid-battler'
primary_region = 'gru'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # O relay guarda o estado das salas/partida EM MEMÓRIA -> precisa de UMA máquina
  # sempre ligada: nada de dormir (perde a partida) nem dividir jogadores entre máquinas
  # (salas em máquinas diferentes nunca pareiam). Rode também:  fly scale count 1
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
