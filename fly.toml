# fly.toml app configuration file generated for grid-battler on 2026-06-25T01:25:29Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'grid-battler'
primary_region = 'gru'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
